name: Update works

on:
  workflow_dispatch:

jobs:
  update-works:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4
      - run: |
          yarn install
      - run: |
          yarn update-works
      - uses: peter-evans/create-pull-request@v5
        with:
          title: Update works
          commit-message: Update works
          branch: update-works
          add-paths: src/data/works.tsv
